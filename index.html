<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Frete por Filial</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 30px;
        }
        .container {
            max-width: 95%;
            margin: 0 auto;
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #4a90e2;
        }
        .header h1 {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }
        .kpi-card {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-left: 5px solid #4a90e2;
        }
        .kpi-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .kpi-card h3 {
            color: #4a90e2;
            font-size: 1.4rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
        }
        .kpi-card .value {
            color: #ffffff;
            font-size: 3.2rem;
            font-weight: bold;
            line-height: 1.2;
        }
        .kpi-card .value.highlight {
            color: #4a90e2;
        }
        .chart-container {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            min-height: 500px;
        }
        .chart-title {
            text-align: center;
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 2.2rem;
            font-weight: bold;
        }
        .chart-subtitle {
            text-align: center;
            color: #a0aec0;
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-weight: 500;
        }
        .add-data-btn {
            display: block;
            margin: 40px auto;
            padding: 18px 50px;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 35px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(30, 58, 138, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .add-data-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(30, 58, 138, 0.6);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: #2d3748;
            margin: 5% auto;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 35px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .close:hover {
            color: #ffffff;
        }
        .modal-content h2 {
            color: #ffffff;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a90e2;
            font-weight: 500;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #4a90e2;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: #1a202c;
            color: #ffffff;
        }
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.3);
        }
        .form-group input[readonly] {
            background: #2d3748;
            cursor: not-allowed;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .filters-container {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-group {
            flex: 1;
            min-width: 250px;
        }
        .filter-group label {
            display: block;
            margin-bottom: 10px;
            color: #4a90e2;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .filter-group select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #4a90e2;
            border-radius: 12px;
            font-size: 1.2rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            background: #1a202c;
            color: #ffffff;
        }
        .filter-group select:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.3);
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4a90e2 0%, #667eea 100%);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 1000;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.6);
        }
        .theme-toggle .icon {
            color: white;
        }
        body.light-theme {
            background: linear-gradient(135deg, #f0f2f5 0%, #e9ecef 100%);
        }
        body.light-theme .container {
            background: #ffffff;
        }
        body.light-theme .theme-toggle .icon {
            color: #333;
        }
        body.light-theme .header h1 {
            color: #1e3a8a;
        }
        body.light-theme .header {
            border-bottom: 3px solid #1e3a8a;
        }
        body.light-theme .kpi-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-left: 5px solid #1e3a8a;
        }
        body.light-theme .kpi-card h3 {
            color: #1e3a8a;
        }
        body.light-theme .kpi-card .value {
            color: #333;
        }
        body.light-theme .kpi-card .value.highlight {
            color: #1e3a8a;
        }
        body.light-theme .chart-container {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        body.light-theme .chart-title {
            color: #1e3a8a;
        }
        body.light-theme .chart-subtitle {
            color: #666;
        }
        body.light-theme .chart-container canvas {
            color: #000000;
        }
        body.light-theme {
            --chart-text-color: #000000;
        }
        body.light-theme .filters-container {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        body.light-theme .filter-group label {
            color: #1e3a8a;
        }
        body.light-theme .filter-group select {
            background: #ffffff;
            color: #333;
            border-color: #1e3a8a;
        }
        body.light-theme .filter-group select:focus {
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }
        body.light-theme .modal-content {
            background-color: #ffffff;
        }
        body.light-theme .modal-content h2 {
            color: #333;
        }
        body.light-theme .form-group label {
            color: #555;
        }
        body.light-theme .form-group select,
        body.light-theme .form-group input {
            background: #ffffff;
            color: #333;
            border-color: #e0e0e0;
        }
        body.light-theme .form-group select:focus,
        body.light-theme .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        body.light-theme .form-group input[readonly] {
            background: #f5f5f5;
        }
        body.light-theme .close:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <button id="themeToggle" class="theme-toggle">

                <h2>Inserir Novos Dados</h2>
                <form id="dataForm">
                    <div class="form-group">
                        <label for="mes">Mês:</label>
                        <select id="mes" required>
                            <option value="JANEIRO">Janeiro</option>

                                background: #1a202c;
                                color: #ffffff;
                            }

                    </div>

                    <div class="form-group">

                        <input type="text" id="uf" readonly>

                    <div class="form-group">

                    <div class="form-group">
                        <label for="peso">Peso (Kg):</label>
                        <input type="number" id="peso" required min="0" step="0.01">

                    </div>
                    <button type="submit" class="submit-btn">Salvar</button>

        // Função para calcular totais a partir das filiais
        function calcularTotais(mes) {
            const filiais = dadosPorMes[mes].filiais;
            let totalCte = 0;
            let totalFrete = 0;
            let totalPeso = 0;
            let totalMercadoria = 0;

            for (const filial in filiais) {
                totalCte += filiais[filial].cte;
                totalFrete += filiais[filial].frete;
                totalPeso += filiais[filial].peso;
                totalMercadoria += filiais[filial].mercadoria;
            }

            return {
                cte: totalCte,
                frete: totalFrete,
                peso: totalPeso,
                mercadoria: totalMercadoria
            };
        }

        // Filial data from JSON
        const filialData = {
            'ATM': { cidade: 'ALTAMIRA', uf: 'PA' },
            'APL': { cidade: 'ANAPOLIS', uf: 'GO' },
            'GYL': { cidade: 'GOIANIA', uf: 'GO' },
            'PPY': { cidade: 'POUSO ALEGRE', uf: 'MG' },
            'APS': { cidade: 'ANAPOLIS', uf: 'GO' },
            'BSB': { cidade: 'BRASILIA', uf: 'DF' },
            'VIX': { cidade: 'SERRA', uf: 'ES' },
            'DCX': { cidade: 'RIO DE JANEIRO', uf: 'RJ' },
            'SPO': { cidade: 'GUARULHOS', uf: 'SP' },
            'GYN': { cidade: 'GOIANIA', uf: 'GO' }
        };

        // Auto-fill cidade and uf when filial is selected
        document.getElementById('filial').addEventListener('change', function() {
            const filial = this.value;
            const cidadeInput = document.getElementById('cidade');
            const ufInput = document.getElementById('uf');
            
            if (filial && filialData[filial]) {
                cidadeInput.value = filialData[filial].cidade;
                ufInput.value = filialData[filial].uf;
            } else {
                cidadeInput.value = '';
                ufInput.value = '';
            }
        });

        // Função para atualizar dashboard
        function updateDashboard() {
            const mes = document.getElementById('filterMonth').value;
            const tipo = document.getElementById('filterType').value;
            const dados = dadosPorMes[mes];
            
            // Calcular totais dinamicamente
            const totais = calcularTotais(mes);

            // Atualizar KPIs
            const cteElement = document.getElementById('kpiCte');
            const freteElement = document.getElementById('kpiFrete');
            const pesoElement = document.getElementById('kpiPeso');
            const mercadoriaElement = document.getElementById('kpiMercadoria');

            cteElement.textContent = totais.cte.toLocaleString('pt-BR');
            freteElement.textContent = 'R$ ' + totais.frete.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            pesoElement.textContent = totais.peso.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' Kg';
            mercadoriaElement.textContent = 'R$ ' + totais.mercadoria.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            // Atualizar título do gráfico
            const tipoLabels = {
                'frete': 'Frete',
                'peso': 'Peso',
                'mercadoria': 'Mercadoria',
                'cte': 'CT-e'
            };
            const tipoUnits = {
                'frete': '(R$)',
                'peso': '(Kg)',
                'mercadoria': '(R$)',
                'cte': '(un)'
            };
            document.getElementById('chartTitle').textContent = 'Gráfico de ' + tipoLabels[tipo];
            document.getElementById('chartSubtitle').textContent = tipoLabels[tipo] + ' por Filial - ' + mes;

            // Atualizar dados do gráfico
            const chartData = data.labels.map(filial => dados.filiais[filial][tipo]);
            data.datasets[0].data = chartData;
            data.datasets[0].label = tipoLabels[tipo] + ' ' + tipoUnits[tipo];

            // Atualizar tooltip
            config.options.plugins.tooltip.callbacks.label = function(context) {
                let value = context.parsed.y;
                if (tipo === 'frete' || tipo === 'mercadoria') {
                    return tipoLabels[tipo] + ': R$ ' + value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                } else if (tipo === 'peso') {
                    return tipoLabels[tipo] + ': ' + value.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' Kg';
                } else {
                    return tipoLabels[tipo] + ': ' + value.toLocaleString('pt-BR');
                }
            };

            // Atualizar escala Y
            if (tipo === 'frete' || tipo === 'mercadoria') {
                config.options.scales.y.ticks.callback = function(value) {
                    return 'R$ ' + (value / 1000000).toFixed(1) + 'M';
                };
                config.options.plugins.datalabels.formatter = function(value) {
                    if (value >= 1000000) {
                        return 'R$ ' + (value / 1000000).toFixed(1) + 'M';
                    } else if (value >= 1000) {
                        return 'R$ ' + (value / 1000).toFixed(0) + 'K';
                    } else {
                        return 'R$ ' + value.toFixed(0);
                    }
                };
            } else if (tipo === 'peso') {
                config.options.scales.y.ticks.callback = function(value) {
                    return (value / 1000000).toFixed(1) + 'M Kg';
                };
                config.options.plugins.datalabels.formatter = function(value) {
                    if (value >= 1000000) {
                        return (value / 1000000).toFixed(1) + 'M Kg';
                    } else if (value >= 1000) {
                        return (value / 1000).toFixed(0) + 'K Kg';
                    } else {
                        return value.toFixed(0) + ' Kg';
                    }
                };
            } else {
                config.options.scales.y.ticks.callback = function(value) {
                    return value.toLocaleString('pt-BR');
                };
                config.options.plugins.datalabels.formatter = function(value) {
                    return value.toLocaleString('pt-BR');
                };
            }

            chart.update();
        }

        // Event listeners para filtros
        document.getElementById('filterMonth').addEventListener('change', updateDashboard);
        document.getElementById('filterType').addEventListener('change', updateDashboard);

        // Inicializar dashboard com dados de TODOS
        updateDashboard();

        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            body.classList.add('light-theme');
            themeToggle.querySelector('.icon').textContent = '☀️';
            config.options.plugins.datalabels.color = '#000000';
            chart.update();
        }
        
        themeToggle.addEventListener('click', function() {
            body.classList.toggle('light-theme');
            const isLight = body.classList.contains('light-theme');
            themeToggle.querySelector('.icon').textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            
            // Atualizar cor dos datalabels
            config.options.plugins.datalabels.color = isLight ? '#000000' : '#ffffff';
            chart.update();
        });

        // Modal functionality
        const modal = document.getElementById('modal');
        const addDataBtn = document.getElementById('addDataBtn');
        const closeBtn = document.querySelector('.close');
        const dataForm = document.getElementById('dataForm');

        addDataBtn.onclick = function() {
            modal.style.display = 'block';
        }

        closeBtn.onclick = function() {
            modal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        dataForm.onsubmit = function(e) {
            e.preventDefault();
            
            const mes = document.getElementById('mes').value;
            const filial = document.getElementById('filial').value;
            const cte = parseFloat(document.getElementById('cte').value);
            const peso = parseFloat(document.getElementById('peso').value);
            const mercadoria = parseFloat(document.getElementById('mercadoria').value);
            const frete = parseFloat(document.getElementById('frete').value);

            // Atualizar dados do mês selecionado
            if (dadosPorMes[mes] && dadosPorMes[mes].filiais[filial]) {
                dadosPorMes[mes].filiais[filial].cte += cte;
                dadosPorMes[mes].filiais[filial].frete += frete;
                dadosPorMes[mes].filiais[filial].peso += peso;
                dadosPorMes[mes].filiais[filial].mercadoria += mercadoria;
            }

            // Atualizar dados de TODOS também
            if (dadosPorMes['TODOS'].filiais[filial]) {
                dadosPorMes['TODOS'].filiais[filial].cte += cte;
                dadosPorMes['TODOS'].filiais[filial].frete += frete;
                dadosPorMes['TODOS'].filiais[filial].peso += peso;
                dadosPorMes['TODOS'].filiais[filial].mercadoria += mercadoria;
            }

            // Atualizar dashboard
            updateDashboard();

            // Reset form and close modal
            dataForm.reset();
            modal.style.display = 'none';
            
            alert('Dados adicionados com sucesso!');
        }
    </script>
</body>
</html>
